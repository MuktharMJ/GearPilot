<?xml version="1.0" encoding="UTF-8"?>
<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-LG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#18181b"/>
      <stop offset="100%" stop-color="#09090b"/>
    </linearGradient>
    <radialGradient id="glow-LG" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#db2777" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#831843" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="laptop-LG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3f3f46"/>
      <stop offset="100%" stop-color="#27272a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" fill="url(#bg-LG)"/>
  <rect width="600" height="400" fill="url(#glow-LG)"/>

  <!-- Laptop Screen Silhouette -->
  <rect x="150" y="80" width="300" height="190" rx="12" fill="url(#laptop-LG)" stroke="#52525b" stroke-width="2"/>
  <rect x="156" y="86" width="288" height="178" rx="8" fill="#000000"/>

  <!-- Laptop Base Silhouette -->
  <path d="M 120 270 L 480 270 L 500 290 L 100 290 Z" fill="#3f3f46" stroke="#52525b" stroke-width="2"/>
  <rect x="250" y="270" width="100" height="6" fill="#52525b" rx="2"/>

  <!-- Brand Text inside Screen -->
  <text x="300" y="185" font-family="system-ui, sans-serif" font-size="32" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="4">LG</text>
  
  <!-- Glowing Under-accent -->
  <path d="M 200 290 L 400 290" stroke="#db2777" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
</svg>